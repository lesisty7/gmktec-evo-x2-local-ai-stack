arch: amd64
cores: 24
description: --- GPU AMD Strix Halo ---%0A --- AI Models & Cache ---%0A --- Containers Data ---%0A
features: keyctl=1,nesting=1
hostname: ai-runtime
memory: 49152
mp0: /mnt/ai-models/llm,mp=/mnt/ai-models/llm,replicate=0
mp1: /mnt/ai-models/sd,mp=/mnt/ai-models/sd,replicate=0
mp2: /mnt/ai-models/cache,mp=/mnt/ai-models/cache,replicate=0
mp3: /mnt/containers/open-webui-data,mp=/mnt/containers/open-webui-data
mp4: /mnt/containers/postgres-data,mp=/mnt/containers/postgres-data
mp5: /mnt/containers/n8n-data,mp=/mnt/containers/n8n-data
mp6: /mnt/containers/qdrant-data,mp=/mnt/containers/qdrant-data
mp7: /mnt/containers/dify-data,mp=/mnt/containers/dify-data
mp8: /mnt/containers/comfyui-data,mp=/mnt/containers/comfyui-data
mp9: /mnt/containers/llm-config,mp=/mnt/containers/llm-config
mp10: /mnt/containers/searxng-data,mp=/mnt/containers/searxng-data
mp11: /mnt/containers/docling-data,mp=/mnt/containers/docling-data
mp12: /mnt/containers/pipelines-data,mp=/mnt/containers/pipelines-data
mp13: /mnt/containers/speaches-data,mp=/mnt/containers/speaches-data
mp14: /mnt/containers/docs-store,mp=/mnt/containers/docs-store
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,hwaddr=AA:BB:CC:DD:EE:FF,ip=192.168.1.241/24,type=veth
onboot: 0
ostype: ubuntu
rootfs: local-zfs:subvol-101-disk-0,size=164G
startup: order=10,up=60,down=30
swap: 0
lxc.apparmor.profile: unconfined
lxc.cgroup2.devices.allow: c 226:0 rwm
lxc.cgroup2.devices.allow: c 226:128 rwm
lxc.cgroup2.devices.allow: c 235:0 rwm
lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir 0 0
lxc.mount.entry: /dev/kfd dev/kfd none bind,optional,create=file 0 0
