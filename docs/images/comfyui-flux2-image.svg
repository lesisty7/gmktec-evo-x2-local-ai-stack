<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
    .accent { fill: #e0f2fe; }
    .text { font: 600 16px sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .sub { font: 400 13px sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="40" y="40" class="title">Flux 2 klein 9B Q5 GGUF: text-to-image</text>

  <rect x="40" y="100" width="150" height="90" class="box accent"/>
  <text x="115" y="135" class="text">Prompt</text>
  <text x="115" y="162" class="sub">text + negative guidance</text>

  <rect x="250" y="100" width="170" height="90" class="box"/>
  <text x="335" y="135" class="text">Text Encoder</text>
  <text x="335" y="162" class="sub">Qwen / Flux conditioning</text>

  <rect x="480" y="100" width="170" height="90" class="box"/>
  <text x="565" y="135" class="text">UNet GGUF</text>
  <text x="565" y="162" class="sub">flux-2-klein-9b</text>

  <rect x="710" y="100" width="170" height="90" class="box"/>
  <text x="795" y="135" class="text">Sampler</text>
  <text x="795" y="162" class="sub">seed + steps + guidance</text>

  <rect x="940" y="100" width="100" height="90" class="box"/>
  <text x="990" y="135" class="text">VAE</text>
  <text x="990" y="162" class="sub">decode</text>

  <rect x="1070" y="100" width="100" height="90" class="box accent"/>
  <text x="1120" y="135" class="text">Image</text>
  <text x="1120" y="162" class="sub">save output</text>

  <path d="M190 145 L250 145" class="arrow"/>
  <path d="M420 145 L480 145" class="arrow"/>
  <path d="M650 145 L710 145" class="arrow"/>
  <path d="M880 145 L940 145" class="arrow"/>
  <path d="M1040 145 L1070 145" class="arrow"/>
</svg>
